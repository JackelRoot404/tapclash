# Solana Mobile dApp Store publishing config.
# Used by @solana-mobile/dapp-store-cli (npx dapp-store).
# Docs: https://docs.solanamobile.com/dapp-publishing/intro

publisher:
  name: TapClash Labs
  website: https://jackelroot404.github.io/solana-seeker-tapclash/
  email: twigzzz28@gmail.com
  address: Remote, US

app:
  android_package: com.tapclash.app
  name: TapClash
  urls:
    # GitHub Pages site (docs/ on main). CONFIRM the exact base URL after Pages is
    # enabled — the lowercased owner login may differ if the account is renamed.
    license_url: https://jackelroot404.github.io/solana-seeker-tapclash/copyright.html
    copyright_url: https://jackelroot404.github.io/solana-seeker-tapclash/copyright.html
    privacy_policy_url: https://jackelroot404.github.io/solana-seeker-tapclash/privacy.html
    website: https://jackelroot404.github.io/solana-seeker-tapclash/
  google_store_package: null

release:
  # Bumped automatically by `npx dapp-store create release`; track in git.
  address: null
  media:
    - purpose: icon
      uri: ./media/icon.png
    - purpose: banner
      uri: ./media/banner.png
    - purpose: screenshot
      uri: ./media/screenshot_1.png
    - purpose: screenshot
      uri: ./media/screenshot_2.png
    - purpose: screenshot
      uri: ./media/screenshot_3.png
    - purpose: screenshot
      uri: ./media/screenshot_4.png
  files:
    - purpose: install
      uri: ../android/app/build/outputs/bundle/release/app-release.aab
  catalog:
    en-US:
      name: TapClash
      short_description: 30-second tap battles. Climb the monthly Solana season leaderboard.
      long_description: |
        Tap fast. Stay accurate. Win the season.

        TapClash is a 30-second reaction-speed game built for Solana Seeker.
        Targets pop up on screen — tap them before they vanish. Hit early for
        bonus points, grab the gold targets, dodge the bombs, chain combos, and
        aim for perfect accuracy.

        Pick your style across four game modes — Classic, Frenzy, Precision, and
        Sudden Death — each with its own independent leaderboard. Every score is
        signed by your Seed Vault wallet and posted to a global monthly board.
        Top finishers earn season-end ranks. Paid prize pools are coming.

        - 30-second rounds you can play in line for coffee
        - Four game modes + varied targets (bonus, mini, bomb), each its own board
        - Monthly seasons reset on the 1st, UTC — fresh start every month
        - Your wallet, your scores — no email, no account, no tracking
        - Built natively for Solana Seeker and the Seed Vault
      new_in_version: Initial release — four game modes, target variety, and per-mode signed-score leaderboards.
      saga_features: |
        TapClash uses the Solana Seed Vault for wallet authentication and
        score signing. No private keys ever leave your device.
      tagline: Tap fast. Stay accurate. Win the season.
  solana_mobile_dapp_publisher_portal:
    google_store_package: null
    testing_instructions: |
      1. Launch TapClash and tap "Start round" on the Play tab.
      2. Tap as many targets as you can in 30 seconds.
      3. When the round ends, choose "Connect wallet to submit" — sign the
         message in your Seed Vault.
      4. Confirm your score appears on the Ranks tab with your wallet shortened.
